# Minimal Phase 3 deployment sketch — tune for your cluster.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nance-proxy
  labels:
    app: nance-proxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nance-proxy
  template:
    metadata:
      labels:
        app: nance-proxy
    spec:
      terminationGracePeriodSeconds: 45
      containers:
        - name: proxy
          image: ghcr.io/taeven/nance/accelerator-proxy:dev
          ports:
            - containerPort: 27018
              name: wire
            - containerPort: 9090
              name: health
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: nance-secrets
                  key: database-url
            - name: NANCE_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: nance-secrets
                  key: master-key
            - name: NANCE_REDIS_ADDR
              value: redis:6379
            - name: NANCE_PROXY_DRAIN_TIMEOUT
              value: "30s"
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 20
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
---
apiVersion: v1
kind: Service
metadata:
  name: nance-proxy
spec:
  selector:
    app: nance-proxy
  ports:
    - name: wire
      port: 27018
      targetPort: wire
    - name: health
      port: 9090
      targetPort: health
  # Prefer L4 / TCP LB that preserves long-lived connections
  type: ClusterIP
