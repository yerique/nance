name: Build and push Docker images (GHCR)

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Deploy manifests live in the GitOps repo (PR opened after image push).
  DEPLOY_REPO: taeven/nance-deploy
  DEPLOY_BRANCH: main
  DEPLOY_OVERLAY: deployments/nance/overlays/dev

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: controlplane
            dockerfile: apps/accelerator/Dockerfile.controlplane
            context: apps/accelerator
            image_suffix: nance/accelerator-controlplane
          - name: proxy
            dockerfile: apps/accelerator/Dockerfile.proxy
            context: apps/accelerator
            image_suffix: nance/accelerator-proxy
          - name: dashboard
            dockerfile: apps/admin-dashboard/Dockerfile
            context: apps/admin-dashboard
            image_suffix: nance/admin-dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image_suffix }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          platforms: linux/amd64

      - name: Image summary
        if: github.event_name != 'pull_request'
        run: |
          echo "### ${{ matrix.name }} image" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  # Open a PR in nance-deploy so merge applies the new images to the cluster.
  open-deploy-pr:
    name: Open deploy PR (nance-deploy)
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Resolve image tags
        id: images
        shell: bash
        run: |
          OWNER="${{ github.repository_owner }}"
          REG="${{ env.REGISTRY }}"
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "tag=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "controlplane=${REG}/${OWNER}/nance/accelerator-controlplane" >> "$GITHUB_OUTPUT"
          echo "proxy=${REG}/${OWNER}/nance/accelerator-proxy" >> "$GITHUB_OUTPUT"
          echo "dashboard=${REG}/${OWNER}/nance/admin-dashboard" >> "$GITHUB_OUTPUT"

      - name: Checkout deploy repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.DEPLOY_REPO }}
          # PAT with contents:write + pull_requests:write on nance-deploy
          token: ${{ secrets.DEPLOY_REPO_TOKEN }}
          ref: ${{ env.DEPLOY_BRANCH }}

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Bump image tags in Kustomize overlay
        env:
          CP_IMAGE: ${{ steps.images.outputs.controlplane }}
          PROXY_IMAGE: ${{ steps.images.outputs.proxy }}
          DASH_IMAGE: ${{ steps.images.outputs.dashboard }}
          TAG: ${{ steps.images.outputs.tag }}
          OVERLAY: ${{ env.DEPLOY_OVERLAY }}
        run: |
          set -euo pipefail
          KUSTOMIZATION="${OVERLAY}/kustomization.yaml"
          test -f "$KUSTOMIZATION"

          yq -i "(.images[] | select(.name == \"controlplane\") | .newName) = \"${CP_IMAGE}\"" "$KUSTOMIZATION"
          yq -i "(.images[] | select(.name == \"controlplane\") | .newTag) = \"${TAG}\"" "$KUSTOMIZATION"
          yq -i "(.images[] | select(.name == \"proxy\") | .newName) = \"${PROXY_IMAGE}\"" "$KUSTOMIZATION"
          yq -i "(.images[] | select(.name == \"proxy\") | .newTag) = \"${TAG}\"" "$KUSTOMIZATION"
          yq -i "(.images[] | select(.name == \"dashboard\") | .newName) = \"${DASH_IMAGE}\"" "$KUSTOMIZATION"
          yq -i "(.images[] | select(.name == \"dashboard\") | .newTag) = \"${TAG}\"" "$KUSTOMIZATION"

          echo "Updated ${KUSTOMIZATION}:"
          cat "$KUSTOMIZATION"

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.DEPLOY_REPO_TOKEN }}
          commit-message: "deploy: bump nance images to ${{ steps.images.outputs.tag }}"
          branch: deploy/nance-${{ steps.images.outputs.tag }}
          delete-branch: true
          title: "deploy: nance images ${{ steps.images.outputs.tag }}"
          body: |
            ## Automated deploy PR

            Opened by [`${{ github.repository }}`](https://github.com/${{ github.repository }}) on commit `${{ github.sha }}`.

            | Component | Image |
            |-----------|--------|
            | controlplane | `${{ steps.images.outputs.controlplane }}:${{ steps.images.outputs.tag }}` |
            | proxy | `${{ steps.images.outputs.proxy }}:${{ steps.images.outputs.tag }}` |
            | dashboard | `${{ steps.images.outputs.dashboard }}:${{ steps.images.outputs.tag }}` |

            Source: https://github.com/${{ github.repository }}/commit/${{ github.sha }}

            After merge, the **deploy** workflow in **nance-deploy** applies `deployments/nance/overlays/dev` to the Kubernetes cluster.
          labels: |
            deploy
            automated
